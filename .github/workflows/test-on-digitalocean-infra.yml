name: Setup NS8 clusters on DigitalOcean and test module

on:
  workflow_call:
    inputs:
      script:
        required: false
        description: Name of the script to execute
        type: string
        default: test-module.sh
      path:
        required: false
        description: Path where the script is located
        type: string
        default: .
      args:
        required: false
        description: Additional arguments to pass to the script
        type: string
        default: ""
      repo_ref:
        required: false
        type: string
        default: ""
        description: Git ref or commit to check out for the module repository
      debug_shell:
        required: false
        type: boolean
        default: false
        description: Obtain a debug shell via tmate
      coremodules:
        required: false
        type: string
        default: ""
        description: Space-separated core module images to install with NS8
      corebranch:
        required: false
        type: string
        default: ns8-stable
        description: Branch or tag of ns8-core used for install.sh
      setup_cluster:
        required: false
        type: boolean
        default: true
        description: If true, install and initialize the NS8 cluster
      leader_nodes:
        required: false
        type: string
        default: "dn1 rl1"
        description: Space-separated leader nodes to create
      do_project:
        required: false
        type: string
        default: NS8-CI
        description: DigitalOcean project where to create the droplets
      do_domain:
        required: false
        type: string
        default: ci.nethserver.net
        description: DigitalOcean domain where to create the DNS records
    secrets:
      do_token:
        required: true
        description: DigitalOcean token used to create the infrastructure

env:
  TF_VAR_project: ${{ inputs.do_project }}
  TF_VAR_domain: ${{ inputs.do_domain }}

jobs:
  info:
    name: Find NS8 cluster information
    runs-on: ubuntu-latest
    outputs:
      nodes: ${{ steps.nodes.outputs.list }}
      repo_ref: ${{ steps.repo_ref.outputs.value }}
      short_sha: ${{ steps.short_sha.outputs.value }}
    steps:
      - name: Create the list of leader nodes
        id: nodes
        run: |
          nodes=$(jq -ncR '[inputs]' <<< "$(echo '${{ inputs.leader_nodes }}' | tr ' ' '\n')")
          echo "list=${nodes}" >> "$GITHUB_OUTPUT"
      - name: Resolve the module git ref
        id: repo_ref
        run: |
          ref='${{ inputs.repo_ref }}'
          if [ -z "$ref" ]; then
            ref='${{ github.event.workflow_run.head_sha || github.sha }}'
          fi
          echo "value=${ref}" >> "$GITHUB_OUTPUT"
      - name: Compute the short sha
        id: short_sha
        run: |
          echo "value=$(echo '${{ steps.repo_ref.outputs.value }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"

  test-module:
    name: Test on DigitalOcean
    runs-on: ubuntu-latest
    needs: info
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}-${{ matrix.node }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(needs.info.outputs.nodes) }}
    steps:
      - name: Checkout the module repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.info.outputs.repo_ref }}
          path: module

      - name: Checkout the infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: NethServer/ns8-terraform-infra
          path: infra

      - name: OpenTofu - Setup Tofu
        uses: opentofu/setup-opentofu@v1.0.8
        with:
          tofu_wrapper: false

      - name: OpenTofu - Tofu Apply
        env:
          TF_VAR_do_token: ${{ secrets.do_token }}
        run: |
          workspace='${{ matrix.node }}-${{ needs.info.outputs.short_sha }}'
          tofu init
          tofu workspace new "$workspace" || tofu workspace select "$workspace"
          tofu apply -var 'leader_node={"${{ matrix.node }}":"ams3"}' -auto-approve
        working-directory: ${{ github.workspace }}/infra

      - name: OpenTofu - Tofu Output Deploy Key
        run: |
          tofu output -raw deploy-key > "${{ github.workspace }}/key"
          chmod 0600 "${{ github.workspace }}/key"
        working-directory: ${{ github.workspace }}/infra

      - name: Wait for SSH server to be ready
        run: |
          for (( c=1; c<=20; c++ )); do
            set +e
            ssh -o StrictHostKeyChecking=no -o GlobalKnownHostsFile=/dev/null -i "${{ github.workspace }}/key" \
              root@${{ matrix.node }}.leader.${{ matrix.node }}-${{ needs.info.outputs.short_sha }}.${{ env.TF_VAR_domain }} true
            if [ "$?" = "0" ]; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Wait for boot to complete
        run: |
          ssh -o StrictHostKeyChecking=no -o GlobalKnownHostsFile=/dev/null -i "${{ github.workspace }}/key" \
            root@${{ matrix.node }}.leader.${{ matrix.node }}-${{ needs.info.outputs.short_sha }}.${{ env.TF_VAR_domain }} \
            'systemctl is-system-running --wait || : '

      - name: Install NS8 system
        if: inputs.setup_cluster
        run: |
          ssh -o StrictHostKeyChecking=no -o GlobalKnownHostsFile=/dev/null -i "${{ github.workspace }}/key" \
            root@${{ matrix.node }}.leader.${{ matrix.node }}-${{ needs.info.outputs.short_sha }}.${{ env.TF_VAR_domain }} << EOF
            set -e -x
            [ -f /etc/yum.conf ] && echo "exclude=kernel* kmod* microcode_ctl grub2*" >> /etc/yum.conf
            curl -O https://raw.githubusercontent.com/NethServer/ns8-core/${{ inputs.corebranch }}/core/install.sh
            bash install.sh ${{ inputs.coremodules }}
          EOF

      - name: Create NS8 cluster
        if: inputs.setup_cluster
        run: |
          ssh -o StrictHostKeyChecking=no -o GlobalKnownHostsFile=/dev/null -i "${{ github.workspace }}/key" \
            root@${{ matrix.node }}.leader.${{ matrix.node }}-${{ needs.info.outputs.short_sha }}.${{ env.TF_VAR_domain }} << EOF
            set -e -x
            create-cluster ${{ matrix.node }}.leader.${{ matrix.node }}-${{ needs.info.outputs.short_sha }}.${{ env.TF_VAR_domain }}:55820 10.5.4.0/24 Nethesis,1234
          EOF

      - name: Run tests
        env:
          SSH_KEYFILE: ${{ github.workspace }}/key
          COREMODULES: ${{ inputs.coremodules }}
        run: |
          ./${{ inputs.script }} ${{ matrix.node }}.leader.${{ matrix.node }}-${{ needs.info.outputs.short_sha }}.${{ env.TF_VAR_domain }} ${{ inputs.args }}
        working-directory: ${{ github.workspace }}/module/${{ inputs.path }}

      - name: Save tests results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-logs-${{ matrix.node }}
          path: ${{ github.workspace }}/module/${{ inputs.path }}/tests/outputs/
          if-no-files-found: warn

      - name: Debugging with tmate
        if: ${{ inputs.debug_shell == true && !cancelled() && always() }}
        uses: mxschmitt/action-tmate@v3

      - name: OpenTofu - Tofu Destroy
        if: ${{ always() }}
        env:
          TF_VAR_do_token: ${{ secrets.do_token }}
        run: |
          workspace='${{ matrix.node }}-${{ needs.info.outputs.short_sha }}'
          if [ ! -d "${GITHUB_WORKSPACE}/infra" ]; then
            echo "Skipping destroy: infra checkout directory is missing"
            exit 0
          fi

          cd "${GITHUB_WORKSPACE}/infra"
          tofu init
          if ! tofu workspace select "$workspace"; then
            echo "Skipping destroy: workspace $workspace was not created"
            exit 0
          fi

          tofu apply -destroy -auto-approve